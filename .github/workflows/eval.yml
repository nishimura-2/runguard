name: eval

on:
  push:
  pull_request:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # hermetic: GCP/Gemini 不要。eval は pydantic + pyyaml だけで動く。
      - run: pip install pydantic pyyaml
      - name: unit tests (hermetic subset)
        run: python -m unittest tests.test_diagnose tests.test_decide tests.test_loop tests.test_elastic tests.test_real_env tests.test_selfheal tests.test_adk
      - name: eval
        run: python eval/run_eval.py
